name: Build

on:
  workflow_dispatch:

jobs:
  domain:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 26

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Build domain
        run: ./gradlew :domain:build

  javafx:
    runs-on: ubuntu-latest
    needs: domain

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 26

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Build app
        run: ./gradlew :app:javafx:build
